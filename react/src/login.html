<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio de Sesión - Sistema de Administración Académica</title>
    <style>
      :root {
        --green-dark: #1e5631;
        --green-medium: #2a7e43;
        --yellow-accent: #f0c808;
        --yellow-light: #fff7d6;
        --neutral-light: #f8f9fa;
        --shadow: rgba(0, 0, 0, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: var(--green-medium);
        background-image: linear-gradient(
          135deg,
          var(--green-dark) 0%,
          var(--green-medium) 100%
        );
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .login-container {
        background-color: var(--neutral-light);
        border-radius: 10px;
        box-shadow: 0 8px 24px var(--shadow);
        width: 400px;
        overflow: hidden;
        position: relative;
      }

      .login-header {
        background-color: var(--green-dark);
        padding: 25px 0;
        text-align: center;
        position: relative;
      }

      .login-header::after {
        content: "";
        position: absolute;
        bottom: -15px;
        left: 0;
        right: 0;
        height: 30px;
        background-color: var(--green-dark);
        transform: skewY(-2deg);
      }

      .school-logo {
        background-color: var(--yellow-accent);
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
        border: 4px solid white;
        position: relative;
        z-index: 2;
      }

      .school-logo svg {
        width: 42px;
        height: 42px;
        fill: var(--green-dark);
      }

      .login-form {
        padding: 40px 30px 30px;
      }

      .form-title {
        color: var(--green-dark);
        text-align: center;
        margin-bottom: 30px;
        font-weight: 600;
      }

      .form-group {
        margin-bottom: 20px;
        position: relative;
      }

      .form-group svg {
        position: absolute;
        left: 12px;
        top: 12px;
        width: 20px;
        height: 20px;
        fill: var(--green-medium);
      }

      .form-control {
        width: 100%;
        padding: 12px 12px 12px 40px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 15px;
        transition: all 0.3s ease;
      }

      .form-control:focus {
        border-color: var(--yellow-accent);
        box-shadow: 0 0 0 3px rgba(240, 200, 8, 0.2);
        outline: none;
      }

      .forgot-password {
        display: block;
        text-align: right;
        color: var(--green-medium);
        font-size: 14px;
        margin-bottom: 25px;
        text-decoration: none;
      }

      .forgot-password:hover {
        color: var(--green-dark);
        text-decoration: underline;
      }

      .btn-login {
        display: block;
        width: 100%;
        padding: 12px;
        background-color: var(--yellow-accent);
        color: var(--green-dark);
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-login:hover {
        background-color: var(--green-dark);
        color: var(--yellow-accent);
      }

      .login-footer {
        text-align: center;
        padding: 20px 30px;
        background-color: var(--yellow-light);
        border-top: 1px solid #eee;
      }

      .login-footer p {
        color: var(--green-dark);
        font-size: 14px;
      }

      .login-footer a {
        color: var(--green-medium);
        text-decoration: none;
        font-weight: 600;
      }

      .login-footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-header">
        <div class="school-logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path
              d="M12,3L1,9L12,15L21,10.09V17H23V9M5,13.18V17.18L12,21L19,17.18V13.18L12,17L5,13.18Z"
            />
          </svg>
        </div>
      </div>

      <div class="login-form">
        <h2 class="form-title">Sistema de Administración Académica</h2>

        <form>
          <div class="form-group">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path
                d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"
              />
            </svg>
            <input
              type="text"
              class="form-control"
              placeholder="Usuario"
              required
            />
          </div>

          <div class="form-group">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path
                d="M12,17A2,2 0 0,0 14,15C14,13.89 13.1,13 12,13A2,2 0 0,0 10,15A2,2 0 0,0 12,17M18,8A2,2 0 0,1 20,10V20A2,2 0 0,1 18,22H6A2,2 0 0,1 4,20V10C4,8.89 4.9,8 6,8H7V6A5,5 0 0,1 12,1A5,5 0 0,1 17,6V8H18M12,3A3,3 0 0,0 9,6V8H15V6A3,3 0 0,0 12,3Z"
              />
            </svg>
            <input
              type="password"
              class="form-control"
              placeholder="Contraseña"
              required
            />
          </div>

          <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>

          <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>
      </div>

      <div class="login-footer">
        <p>
          © 2025 Sistema de Administración Académica |
          <a href="#">Soporte Técnico</a>
        </p>
      </div>
    </div>
  </body>
</html>
