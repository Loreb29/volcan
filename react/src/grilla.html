<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema Académico – Grilla</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --green-dark: #2d6a2d;
        --gold: #f5c518;
        --card-bg: #ffffff;
        --header-bg: #f5f8f5;
        --row-alt: #f0f5f0;
        --border: #b8ccb8;
        --text-main: #1a2e1a;
        --text-sub: #4a6a4a;
        --text-header: #2d5a2d;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: "Outfit", sans-serif;
        color: var(--text-main);
        display: flex;
        flex-direction: column;
      }

      /* ── NAVBAR ───────────────────────────────────────── */
      .navbar {
        background: var(--green-dark);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        height: 60px;
        flex-shrink: 0;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
        position: relative;
        z-index: 100;
      }

      .navbar-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }

      .navbar-logo {
        width: 38px;
        height: 38px;
        background: var(--gold);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: var(--green-dark);
        font-weight: 800;
      }

      .navbar-name {
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .navbar-title {
        color: #fff;
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
      }

      .navbar-user {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
      }

      .user-avatar {
        width: 36px;
        height: 36px;
        background: var(--gold);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 0.85rem;
        color: var(--green-dark);
      }

      .user-name {
        color: #fff;
        font-size: 0.9rem;
        font-weight: 600;
      }
      .user-chevron {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.7rem;
      }

      /* ── MAIN & WRAPPER fill remaining height ─────────── */
      main {
        flex: 1;
        overflow: auto;
        scroll-snap-type: y mandatory;
        scroll-behavior: smooth;
      }

      /* ── TABLE ────────────────────────────────────────── */
      table {
        border-collapse: collapse;
        width: 100%;
        min-width: 700px;
        table-layout: fixed;
      }

      th,
      td {
        border: 1.5px solid var(--border);
        padding: 0;
        vertical-align: middle;
      }

      thead tr {
        scroll-snap-align: start;
      }
      /* Header row */
      thead tr th {
        background: var(--green-dark);
        height: 56px;
        text-align: center;
        font-size: 0.88rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #fff;
        position: sticky;
        top: 0;
        z-index: 2;
      }

      thead tr th:first-child {
        width: 160px;
      }
      thead tr th:not(:first-child) {
        width: 160px;
      }

      /* Body rows */
      tbody tr {
        height: 90px;
        scroll-snap-align: start;
      }
      tbody tr:nth-child(even) td {
        background: var(--row-alt);
      }
      tbody tr:nth-child(odd) td {
        background: var(--card-bg);
      }

      /* Row label cell */
      tbody tr td:first-child {
        background: var(--header-bg);
        font-size: 0.82rem;
        font-weight: 700;
        color: var(--text-header);
        padding: 10px 14px;
        letter-spacing: 0.02em;
        border-right: 2px solid var(--border);
        position: sticky;
        left: 0;
        z-index: 1;
      }

      /* Data cells */
      tbody tr td:not(:first-child) {
        text-align: center;
        font-size: 0.85rem;
        color: var(--text-sub);
        transition: background 0.15s;
        cursor: default;
      }

      tbody tr td:not(:first-child):hover {
        background: #d8edd8 !important;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a class="navbar-brand" href="#">
        <div class="navbar-logo">🎓</div>
        <span class="navbar-name">Sistema Académico</span>
      </a>
      <span class="navbar-title">11</span>
      <div class="navbar-user">
        <div class="user-avatar">AD</div>
        <span class="user-name">Admin</span>
        <span class="user-chevron">▾</span>
      </div>
    </nav>

    <main>
      <table>
        <thead>
          <tr>
            <th></th>
            <th>Materia</th>
            <th>Materia</th>
            <th>Materia</th>
            <th>Materia</th>
            <th>Materia</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Curso (601)</td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
          </tr>
          <tr>
            <td>Curso (602)</td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
          </tr>

          <!--
          ┌─ ADD MORE ROWS HERE ───────────────────────────────────────┐
          │ Copy any <tr> block above, update the first <td> label,    │
          │ and add content inside the other <td> cells as needed.     │
          │ Even/odd zebra striping is automatic.                       │
          └────────────────────────────────────────────────────────────┘

          ┌─ ADD MORE COLUMNS ─────────────────────────────────────────┐
          │ 1. Add a new <th>Materia</th> in the <thead> row.          │
          │ 2. Add a matching empty <td></td> in every <tbody> row.    │
          └────────────────────────────────────────────────────────────┘
        --></tbody>
      </table>
    </main>
  </body>
</html>
