<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema Académico – Cursos</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── TOKENS ───────────────────────────────────────── */
      :root {
        --green-dark: #2d6a2d;
        --green-mid: #4a9e2f;
        --green-light: #a8d85a;
        --gold: #f5c518;
        --gold-dark: #c9a000;
        --bg: #f0f2f0;
        --card-bg: #ffffff;
        --card-border: #d8ddd8;
        --text-main: #1a2e1a;
        --text-sub: #5a7a5a;
        --bar-track: #d0d8d0;
        --radius-card: 18px;
        --shadow-card:
          0 4px 18px rgba(45, 106, 45, 0.1), 0 1px 4px rgba(0, 0, 0, 0.07);
        --shadow-card-hover:
          0 10px 32px rgba(45, 106, 45, 0.18), 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      /* ── RESET ────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Outfit", sans-serif;
        background: var(--bg);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── NAVBAR ───────────────────────────────────────── */
      .navbar {
        background: var(--green-dark);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        height: 60px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .navbar-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }

      .navbar-logo {
        width: 38px;
        height: 38px;
        background: var(--gold);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: var(--green-dark);
        font-weight: 800;
        flex-shrink: 0;
      }

      .navbar-name {
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .navbar-title {
        color: #fff;
        font-size: 1.6rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
      }

      .navbar-user {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
      }

      .user-avatar {
        width: 36px;
        height: 36px;
        background: var(--gold);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 0.85rem;
        color: var(--green-dark);
        flex-shrink: 0;
      }

      .user-name {
        color: #fff;
        font-size: 0.9rem;
        font-weight: 600;
      }

      .user-chevron {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.7rem;
      }

      /* ── MAIN ─────────────────────────────────────────── */
      main {
        flex: 1;
        padding: 40px 32px 60px;
        max-width: 1100px;
        width: 100%;
        margin: 0 auto;
      }

      /* ── GRID ─────────────────────────────────────────── */
      .courses-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 24px;
      }

      /* ── CARD ─────────────────────────────────────────── */
      .course-card {
        background: var(--card-bg);
        border: 1.5px solid var(--card-border);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-card);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition:
          transform 0.22s ease,
          box-shadow 0.22s ease;
        cursor: pointer;
      }

      .course-card:hover {
        transform: translateY(-5px) scale(1.015);
        box-shadow: var(--shadow-card-hover);
      }

      /* thumbnail / image area */
      .course-thumbnail {
        width: 100%;
        aspect-ratio: 4/3;
        background: #e4e9e4;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #b0b8b0;
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.03em;
        border-bottom: 1.5px solid var(--card-border);
        /* swap for <img> if you have one */
      }

      .course-thumbnail img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* card body */
      .course-body {
        padding: 14px 16px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .course-number {
        font-size: 2.8rem;
        font-weight: 800;
        line-height: 1;
        color: var(--text-main);
        letter-spacing: -0.02em;
      }

      .course-label {
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--text-sub);
        text-transform: uppercase;
        letter-spacing: 0.07em;
      }

      /* progress bar */
      .progress-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .progress-bar-wrap {
        flex: 1;
        height: 7px;
        background: var(--bar-track);
        border-radius: 99px;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        border-radius: 99px;
        background: linear-gradient(
          90deg,
          var(--green-mid),
          var(--green-light)
        );
        transition: width 0.5s ease;
      }

      .progress-pct {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--green-dark);
        min-width: 34px;
        text-align: right;
      }

      /* ── FOOTER ───────────────────────────────────────── */
      footer {
        text-align: center;
        padding: 16px;
        font-size: 0.75rem;
        color: var(--text-sub);
        border-top: 1px solid var(--card-border);
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <a class="navbar-brand" href="#">
        <div class="navbar-logo">🎓</div>
        <span class="navbar-name">Sistema Académico</span>
      </a>
      <span class="navbar-title">Cursos</span>
      <div class="navbar-user">
        <div class="user-avatar">AD</div>
        <span class="user-name">Admin</span>
        <span class="user-chevron">▾</span>
      </div>
    </nav>

    <!-- COURSES -->
    <main>
      <div class="courses-grid">

            </div>

        </div>

        <!-- Course 7 -->

            <div class="progress-row">
              <div class="progress-bar-wrap">
                <div class="progress-bar-fill" style="width: 25%"></div>
              </div>
              <span class="progress-pct">25%</span>
            </div>
          </div>
        </div>

        <!-- Course 8 -->
        <div class="course-card">
          <div class="course-thumbnail">Imagen</div>
          <div class="course-body">
            <div class="course-number">8</div>
            <div class="course-label">Progreso</div>
            <div class="progress-row">
              <div class="progress-bar-wrap">
                <div class="progress-bar-fill" style="width: 100%"></div>
              </div>
              <span class="progress-pct">100%</span>
            </div>
          </div>
        </div>

        <!-- Course 9 -->
        <div class="course-card">
          <div class="course-thumbnail">Imagen</div>
          <div class="course-body">
            <div class="course-number">9</div>
            <div class="course-label">Progreso</div>
            <div class="progress-row">
              <div class="progress-bar-wrap">
                <div class="progress-bar-fill" style="width: 10%"></div>
              </div>
              <span class="progress-pct">10%</span>
            </div>
          </div>
        </div>

        <!-- Course 10 -->
        <div class="course-card">
          <div class="course-thumbnail">Imagen</div>
          <div class="course-body">
            <div class="course-number">10</div>
            <div class="course-label">Progreso</div>
            <div class="progress-row">
              <div class="progress-bar-wrap">
                <div class="progress-bar-fill" style="width: 90%"></div>
              </div>
              <span class="progress-pct">90%</span>
            </div>
          </div>
        </div>

        <!-- Course 11 -->
        <div class="course-card">
          <div class="course-thumbnail">Imagen</div>
          <div class="course-body">

            <div class="progress-row">
              <div class="progress-bar-wrap">
                <div class="progress-bar-fill" style="width: 80%"></div>
              </div>
              <span class="progress-pct">80%</span>
            </div>
          </div>
        </div>

        <!--
        ┌─ ADD MORE CARDS BELOW ─────────────────────────────────────────┐
        │ Copy any .course-card block above, change the number,          │
        │ update the style="width: XX%" and the percentage text.         │
        │ The grid will reflow automatically.                             │
        └────────────────────────────────────────────────────────────────┘
      --></div>
    </main>

    <footer>Sistema Académico &copy; 2026</footer>
  </body>
</html>
